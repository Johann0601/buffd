# Konfiguration für electron-builder — baut aus dem electron-vite-Output (out/)
# einen Windows-Installer (NSIS). Aufruf: npm run dist

# appId bleibt unverändert (com.spielehub.app) — sonst erkennt der NSIS-Installer
# die bestehende Installation nicht und das Auto-Update bräche. Nur der
# sichtbare Name wird zu „buffd".
appId: com.spielehub.app
productName: buffd

# Wohin Releases hochgeladen werden UND wo die installierte App nach Updates
# sucht (electron-updater liest das aus der mitgepackten app-update.yml).
publish:
  provider: github
  owner: Johann0601
  repo: buffd
  releaseType: release # sofort veröffentlichen (kein Entwurf — Entwürfe sieht der Updater nicht)

directories:
  output: release # hier landet die fertige Setup-exe
  buildResources: build # optional: icon.ico etc. (kommt später)

# Was in die App gepackt wird: der gebaute Code + package.json.
# Die dependencies aus package.json (better-sqlite3 usw.) nimmt
# electron-builder automatisch aus node_modules mit.
files:
  - out/**
  - package.json

# WICHTIG für diesen PC: keine nativen Module neu kompilieren (es gibt keine
# VC++-Build-Tools). Das Electron-Prebuild von better-sqlite3 liegt schon
# in node_modules (postinstall: electron-builder install-app-deps).
npmRebuild: false

# Native .node-Dateien dürfen nicht ins asar-Archiv (Windows kann DLLs
# nicht aus einem Archiv laden) — sie werden daneben entpackt abgelegt.
asarUnpack:
  - '**/*.node'

win:
  icon: build/icon.ico # Logo für Setup.exe, Uninstaller, Desktop-Verknüpfung
  # signAndEditExecutable AUS: das An-/Bearbeiten der exe würde winCodeSign laden,
  # dessen 7z-Extraktion ohne Windows-Developer-Mode an macOS-Symlinks scheitert.
  # Das exe-Icon + die Versions-Infos (sonst stünde überall „Electron") setzt
  # stattdessen der afterPack-Hook per rcedit — siehe build/afterPack.cjs.
  signAndEditExecutable: false
  target:
    - target: nsis
      arch: [x64]

# Nach dem Packen die exe-Ressourcen (Icon, Produktname, Version) per rcedit
# setzen — ersetzt den durch signAndEditExecutable:false übersprungenen Schritt.
afterPack: build/afterPack.cjs

nsis:
  # Geführter Installer (kleiner Assistent) statt Ein-Klick: der Nutzer kann den
  # Zielordner wählen. Auto-Updates laufen trotzdem geräuschlos durch, weil der
  # Updater den Installer still (/S) in den bestehenden Ordner ausführt — dafür
  # ruft die App quitAndInstall(true, true) auf (siehe src/main/index.ts).
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false # Installation pro Benutzer, braucht keine Admin-Rechte
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: buffd
  # Fester Dateiname OHNE Version -> dauerhafter Download-Link:
  #   github.com/Johann0601/buffd/releases/latest/download/buffd-Setup.exe
  # Der Auto-Updater liest den Namen aus latest.yml, funktioniert also weiter.
  artifactName: buffd-Setup.exe
  deleteAppDataOnUninstall: false # Deinstallation löscht NICHT die Spielzeit-DB
